{% extends 'base.html' %}
{% block content %}
<div class="header" style="border: none; padding-bottom: 0;">
    <h2>Contact Lists</h2>
    <a href="{% url 'contact_upload' %}" class="btn">Upload Contacts</a>
</div>
<div class="card glass" style="margin-top: 1rem;">
    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="border-bottom: 1px solid var(--border-color);">
                <th style="padding: 1rem;">List Name</th>
                <th style="padding: 1rem;">Total Contacts</th>
                <th style="padding: 1rem;">Created At</th>
            </tr>
        </thead>
        <tbody>
            {% for l in lists %}
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                <td style="padding: 1rem;">{{ l.name }}</td>
                <td style="padding: 1rem;">{{ l.contacts.count }}</td>
                <td style="padding: 1rem;">{{ l.created_at|date:"M d, Y" }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3" style="padding: 1rem; text-align: center; color: var(--text-muted);">No contact lists uploaded yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

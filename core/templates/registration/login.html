{% extends 'base.html' %}

{% block content %}
<div class="card glass" style="max-width: 400px; margin: 4rem auto; text-align: center;">
    <h2>Login to Campaign Manager</h2>
    <form method="post" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="padding: 0.75rem; font-size: 1.1rem; margin-top: 1rem;">Login</button>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<div class="card glass" style="max-width: 800px; margin: 0 auto;">
    <h2>Add New Email Template</h2>
    <form method="post" style="margin-top: 1.5rem;">
        {% csrf_token %}
        <p><label>Template Name</label>{{ form.name }}</p>
        <p><label>Email Subject</label>{{ form.subject }}</p>
        <p><label>HTML Body</label>{{ form.body_html }}</p>
        <button type="submit" class="btn" style="margin-top: 1rem;">Save Template</button>
    </form>
</div>
{% endblock %}

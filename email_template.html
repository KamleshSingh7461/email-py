<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>FGSN Learning . Sports Media</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style type="text/css">
    body {
      background-color: #f2f2f2 !important;
      color: #111111 !important;
    }
    @media (prefers-color-scheme: dark) {
      body, table, td, p, h1, h2, h3, span, div {
        background-color: inherit !important;
        color: inherit !important;
      }
    }
  </style>
</head>

<body style="margin:0;padding:0;background-color:#f2f2f2;-webkit-text-size-adjust:none;-ms-text-size-adjust:none;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f2f2f2"
    style="background-color:#f2f2f2;margin:0;padding:0;">
    <tr>
      <td align="center" valign="top" bgcolor="#f2f2f2" style="padding:5px 0;background-color:#f2f2f2;">

        <table width="620" cellpadding="0" cellspacing="0" border="0" bgcolor="#161616"
          style="max-width:620px;width:100%;background-color:#161616;font-family:'Barlow',Arial,Helvetica,sans-serif;">

          <!-- ══ GREETING ══ -->
          <tr>
            <td bgcolor="#161616" style="padding:10px 15px 5px 15px;background-color:#161616;">
              <p style="margin:0;font-size:14px;line-height:1.3;
                       font-family:'Barlow',Arial,Helvetica,sans-serif;color:#ffffff;font-weight:400;">
                Hey, <span style="color:#e02010;">$User</span> -
              </p>
            </td>
          </tr>

          <!-- ══ MAIN IMAGE ══ -->
          <tr>
            <td bgcolor="#161616" style="padding:0;background-color:#161616;text-align:center;">
              <img src="Mid Body main.jpeg" alt="Mid Body"
                style="max-width:100%;height:auto;display:block;margin:0 auto;border:none;" />
            </td>
          </tr>

          <!-- ══ TEXT BLOCK ══ -->
          <tr>
            <td bgcolor="#161616" style="padding:10px 15px 10px 15px;background-color:#161616;">
              <p style="margin:0;font-size:13px;line-height:1.4;color:#cccccc;
                       font-family:'Barlow',Arial,Helvetica,sans-serif;">
                Yes, it&rsquo;s an investment., but
                <strong style="color:#ffffff;font-weight:600;">this one pays back instantly .</strong>
              </p>
            </td>
          </tr>

          <!-- ══ CTA BLOCK (RED) ══ -->
          <tr>
            <td bgcolor="#161616" style="padding:0 15px 10px 15px;background-color:#161616;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#e02010"
                style="background-color:#e02010;">
                <tr>
                  <!-- Left: heading + body copy -->
                  <td valign="middle" style="padding:12px 12px 12px 12px;width:55%;">
                    <h3 style="margin:0 0 4px 0;
                              font-family:'Barlow Condensed','Arial Narrow',Impact,Arial,sans-serif;
                              font-weight:900;font-size:18px;color:#ffffff;
                              text-transform:uppercase;letter-spacing:0.02em;">
                      WANT THE FULL BREAKDOWN?
                    </h3>
                    <p style="margin:0;font-size:12px;color:#ffffff;line-height:1.3;
                             font-family:'Barlow',Arial,Helvetica,sans-serif;">
                      we&rsquo;ll walk you through everything.<br/>
                      Structure, schedule, what to expect, and<br/>
                      how to lock in your spot.
                    </p>
                  </td>
                  <!-- Right: phone + WhatsApp -->
                  <td valign="middle" align="center" style="padding:12px 12px 12px 0;width:45%;">
                    <a href="https://wa.me/911234567890" target="_blank" style="display:inline-block;margin-bottom:4px;
                                font-family:'Barlow Condensed','Arial Narrow',Impact,Arial,sans-serif;
                                font-weight:900;font-size:18px;color:#ffffff;
                                letter-spacing:0.02em;white-space:nowrap;text-decoration:none;">
                      +91-1234567890
                    </a>
                    <br/>
                    <span style="font-family:'Barlow Condensed','Arial Narrow',Impact,Arial,sans-serif;
                                font-size:11px;font-weight:500;letter-spacing:0.05em;
                                color:#ffffff;text-transform:uppercase;">
                      OR WHATSAPP US
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ══ CLOSING TAGLINE ══ -->
          <tr>
            <td bgcolor="#161616" style="padding:5px 15px 15px 15px;background-color:#161616;text-align:center;">
              <h1 style="margin:0;
                        font-family:'Barlow Condensed','Arial Narrow',Impact,Arial,sans-serif;
                        font-weight:900;font-size:20px;color:#ffffff;
                        text-transform:uppercase;line-height:1.1;letter-spacing:0.02em;">
                THE INDUSTRY DOESN&rsquo;T WAIT, <span style="color:#e02010;">SO LETS GET TO WORK!!</span>
              </h1>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
